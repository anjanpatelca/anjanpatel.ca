<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anjan Patel — Mechanical Engineering Technologist</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Clash+Display:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #050810;
      --bg1:      #090d1a;
      --bg2:      #0f1525;
      --bg3:      #162035;
      --blue:     #4f8ef7;
      --blue2:    #7ab0ff;
      --blue-dim: rgba(79,142,247,0.1);
      --border:   rgba(255,255,255,0.08);
      --text:     #e2e8f0;
      --text2:    #94a3b8;
      --font-main: 'Space Grotesk', sans-serif;
      --font-head: 'Clash Display', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* GRID BACKGROUND */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      opacity: 0.3;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0; width: 100%;
      padding: 1.5rem 0;
      background: rgba(5, 8, 16, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }
    .nav-inner { display: flex; justify-content: space-between; align-items: center; }
    .nav-links { display: flex; gap: 2.5rem; }
    .nav-links a { text-decoration: none; color: var(--text2); font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
    .nav-links a:hover { color: var(--blue); }

    /* HERO SECTION */
    .hero { min-height: 100vh; display: flex; align-items: center; padding-top: 80px; }
    .hero-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 4rem; align-items: center; }

    .hero-pre { font-family: var(--font-mono); color: var(--blue); font-size: 0.9rem; margin-bottom: 1rem; }
    .hero-title { font-family: var(--font-head); font-size: clamp(3rem, 8vw, 6rem); line-height: 0.95; margin-bottom: 1.5rem; }
    .hero-desc { font-size: 1.25rem; color: var(--text2); max-width: 550px; margin-bottom: 2rem; }
    
    .hero-motto {
      font-family: var(--font-mono);
      color: var(--blue2);
      font-size: 0.85rem;
      border-left: 2px solid var(--blue);
      padding-left: 1.5rem;
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }

    /* STATS (Removed 200 uni/month) */
    .stats { display: flex; gap: 4rem; margin-bottom: 2rem; }
    .stat-item .val { font-family: var(--font-head); font-size: 3rem; color: #fff; line-height: 1; }
    .stat-item .lab { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text2); margin-top: 0.5rem; }

    /* PROFILE PICTURE WITH ANIMATED RINGS */
    .profile-area { position: relative; display: flex; justify-content: center; align-items: center; }
    
    .profile-wrap {
      position: relative;
      width: 400px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border: 1.5px solid var(--blue);
      border-radius: 50%;
      opacity: 0.2;
      animation: rotateRing 20s linear infinite;
    }
    .ring-1 { inset: -10px; border-style: dashed; }
    .ring-2 { inset: -25px; opacity: 0.1; animation-duration: 30s; animation-direction: reverse; }

    @keyframes rotateRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .profile-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--bg2);
      box-shadow: 0 0 50px rgba(79,142,247,0.15);
      z-index: 2;
    }

    /* PROJECT CARDS */
    .section-label { font-family: var(--font-mono); color: var(--blue); font-size: 0.8rem; margin-bottom: 1rem; display: block; }
    .section-title { font-family: var(--font-head); font-size: 3.5rem; margin-bottom: 4rem; }
    
    .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .card { 
      background: var(--bg1); 
      border: 1px solid var(--border); 
      padding: 3rem; 
      border-radius: 24px; 
      transition: 0.4s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { border-color: var(--blue); transform: translateY(-5px); background: var(--bg2); }
    .card h3 { font-family: var(--font-head); font-size: 2.5rem; margin-bottom: 1rem; }
    .card p { color: var(--text2); margin-bottom: 2rem; }

    /* CONTACT AREA */
    .contact-card {
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      border: 1px solid var(--border);
      padding: 5rem;
      border-radius: 40px;
      text-align: center;
      margin-top: 4rem;
    }
    .btn {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      padding: 1.2rem 2.5rem;
