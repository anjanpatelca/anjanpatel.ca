<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjan Patel | Mechanical Engineer</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--light);
            color: var(--dark);
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            margin-bottom: 1rem;
        }
        h1 {
            margin: 0.5rem 0;
            font-size: 1.8rem;
        }
        p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-btn {
            padding: 12px;
            text-decoration: none;
            color: white;
            background-color: var(--primary);
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }
        .link-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }
        .twitter-btn { background-color: #000000; }
        .linkedin-btn { background-color: #0077b5; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://github.com/anjanpatelca.png" alt="Anjan Patel" class="profile-img">
    <h1>Anjan Patel</h1>
    <p>Mechanical Engineer | Edmonton, AB</p>
    
    <div class="social-links">
        <a href="https://www.linkedin.com/in/anjanpatel-ca/" target="_blank" class="link-btn linkedin-btn">LinkedIn Profile</a>
        <a href="https://x.com/anjanpatel_" target="_blank" class="link-btn twitter-btn">Follow on X</a>
        <a href="mailto:contact@anjanpatel.ca" class="link-btn">Contact Me</a>
    </div>
</div>

</body>
</html>
